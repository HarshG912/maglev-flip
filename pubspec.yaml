name: maglev_flip
description: A 2D infinite runner arcade game.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.15.0
  flame_audio: ^2.1.8
  http: ^1.6.0
  csv: ^8.0.0
  supabase_flutter: ^2.14.2
  path_provider: ^2.1.3
  share_plus: ^13.1.0
  video_player: ^2.11.1
  audioplayers: ^6.7.1
  google_mobile_ads: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/icon.png"


